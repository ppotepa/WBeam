<svg width="1280" height="800" viewBox="0 0 1280 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#111b2e"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2740"/>
      <stop offset="100%" stop-color="#152238"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1280" height="800" fill="url(#bg)"/>

  <text x="640" y="72" text-anchor="middle" fill="#dbe7ff" font-size="36" font-family="sans-serif" font-weight="700">
    WBeam Connect
  </text>
  <text x="640" y="106" text-anchor="middle" fill="#8fa4c9" font-size="20" font-family="sans-serif">
    Przygotowanie streamu
  </text>
  <text x="640" y="136" text-anchor="middle" fill="#7fa0cf" font-size="14" font-family="sans-serif">
    Tinty statusow: zielony = OK, pomaranczowy = IN PROGRESS, czerwony = ERROR
  </text>

  <g transform="translate(85,190)">
    <rect x="0" y="0" width="340" height="230" rx="22" fill="url(#card)" stroke="#3c5b88" stroke-width="3"/>
    <circle cx="170" cy="74" r="30" fill="#3d3114" stroke="#f2a533" stroke-width="3"/>
    <path d="M154 74h32M170 58v32" stroke="#ffd690" stroke-width="4" stroke-linecap="round"/>
    <text x="170" y="140" text-anchor="middle" fill="#dce9ff" font-size="28" font-family="sans-serif" font-weight="700">1</text>
    <text x="170" y="173" text-anchor="middle" fill="#dce9ff" font-size="24" font-family="sans-serif">Control Link</text>
    <text x="170" y="201" text-anchor="middle" fill="#9fb4d8" font-size="16" font-family="sans-serif">Połączenie z serwisem hosta</text>
  </g>

  <g transform="translate(470,190)">
    <rect x="0" y="0" width="340" height="230" rx="22" fill="url(#card)" stroke="#3c5b88" stroke-width="3"/>
    <circle cx="170" cy="74" r="30" fill="#173920" stroke="#58d68d" stroke-width="3"/>
    <path d="M156 74l10 10 18-18" fill="none" stroke="#a7f3c7" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="170" y="140" text-anchor="middle" fill="#dce9ff" font-size="28" font-family="sans-serif" font-weight="700">2</text>
    <text x="170" y="173" text-anchor="middle" fill="#dce9ff" font-size="24" font-family="sans-serif">Handshake</text>
    <text x="170" y="201" text-anchor="middle" fill="#9fb4d8" font-size="16" font-family="sans-serif">Wersja i status aplikacji</text>
  </g>

  <g transform="translate(855,190)">
    <rect x="0" y="0" width="340" height="230" rx="22" fill="url(#card)" stroke="#3c5b88" stroke-width="3"/>
    <circle cx="170" cy="74" r="30" fill="#3b201f" stroke="#ff7a70" stroke-width="3"/>
    <path d="M160 64l20 20M180 64l-20 20" stroke="#ffb2ad" stroke-width="4" stroke-linecap="round"/>
    <text x="170" y="140" text-anchor="middle" fill="#dce9ff" font-size="28" font-family="sans-serif" font-weight="700">3</text>
    <text x="170" y="173" text-anchor="middle" fill="#dce9ff" font-size="24" font-family="sans-serif">Streaming</text>
    <text x="170" y="201" text-anchor="middle" fill="#9fb4d8" font-size="16" font-family="sans-serif">Dekoder i dane obrazu</text>
  </g>

  <g>
    <path d="M435 304h30" stroke="#8ea8cf" stroke-width="5" stroke-linecap="round"/>
    <path d="M460 290l20 14-20 14" fill="none" stroke="#8ea8cf" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <g>
    <path d="M820 304h30" stroke="#8ea8cf" stroke-width="5" stroke-linecap="round"/>
    <path d="M845 290l20 14-20 14" fill="none" stroke="#8ea8cf" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <rect x="85" y="470" width="1110" height="220" rx="18" fill="#0f1a2d" stroke="#2f4669" stroke-width="2"/>
  <text x="115" y="514" fill="#a8bfdf" font-size="20" font-family="sans-serif" font-weight="700">Status / Error Log</text>
  <text x="115" y="548" fill="#cedaf0" font-size="18" font-family="monospace">[1] Control Link: OK (api=127.0.0.1:5001)</text>
  <text x="115" y="578" fill="#cedaf0" font-size="18" font-family="monospace">[2] Handshake: waiting for daemon response...</text>
  <text x="115" y="608" fill="#ffb4ad" font-size="18" font-family="monospace">[3] Streaming: reconnect retry #2</text>
  <text x="115" y="650" fill="#7f97b8" font-size="15" font-family="sans-serif">Dolny panel na krótkie, czytelne komunikaty diagnostyczne.</text>
</svg>
