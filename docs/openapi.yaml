openapi: "3.1.0"

info:
  title: WBeam Daemon API
  version: "1.0.0"
  description: >
    HTTP control API for wbeamd-rust (port 5001 over ADB USB reverse tunnel).
    All endpoints are served at both `/v1/<path>` and `/<path>` (legacy alias).

servers:
  - url: http://127.0.0.1:5001
    description: ADB USB reverse tunnel (Android → host)

tags:
  - name: status
    description: Daemon state and health queries
  - name: control
    description: Stream lifecycle commands
  - name: telemetry
    description: Metrics ingestion and reporting

paths:
  /v1/status:
    get:
      operationId: getStatus
      tags: [status]
      summary: Daemon state + active configuration
      responses:
        "200":
          description: Current daemon state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"

  /v1/health:
    get:
      operationId: getHealth
      tags: [status]
      summary: Liveness check + stream process supervision
      responses:
        "200":
          description: Health check result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /v1/presets:
    get:
      operationId: getPresets
      tags: [status]
      summary: All named configuration presets + valid enum values
      responses:
        "200":
          description: Preset map
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PresetsResponse"

  /v1/metrics:
    get:
      operationId: getMetrics
      tags: [telemetry]
      summary: Host-side metrics, KPIs, and adaptation state
      responses:
        "200":
          description: Latest host metrics snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetricsResponse"

  /v1/start:
    post:
      operationId: postStart
      tags: [control]
      summary: Start (or restart) the streaming pipeline
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfigPatch"
      responses:
        "200":
          description: Pipeline started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
        "409":
          description: Already streaming (duplicate guard)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/stop:
    post:
      operationId: postStop
      tags: [control]
      summary: Stop the streaming pipeline
      responses:
        "200":
          description: Pipeline stopped
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"

  /v1/apply:
    post:
      operationId: postApply
      tags: [control]
      summary: Apply configuration patch and restart pipeline
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfigPatch"
      responses:
        "200":
          description: Configuration applied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/client-metrics:
    post:
      operationId: postClientMetrics
      tags: [telemetry]
      summary: Android client pushes per-second decode/render telemetry
      description: >
        Called every ~1s by the Android decoder. The host uses these metrics
        to drive the adaptation state machine (L0–L3) and adjust encoder
        parameters without restarting the pipeline.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientMetricsRequest"
      responses:
        "200":
          description: Metrics accepted; adaptation action (if any) returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientMetricsResponse"

components:
  schemas:

    # ── Base (flattened into every response) ─────────────────────────────────
    BaseResponse:
      type: object
      required: [state, active_config, host_name, uptime, run_id, last_error]
      properties:
        state:
          type: string
          enum: [IDLE, STARTING, STREAMING, STOPPING, ERROR]
          description: Current daemon state machine state
        active_config:
          $ref: "#/components/schemas/ActiveConfig"
        host_name:
          type: string
          example: desktop-linux
        uptime:
          type: integer
          format: int64
          description: Daemon uptime in seconds
        run_id:
          type: integer
          format: int64
          description: Monotonic stream run counter; increments on each start
        last_error:
          type: string
          description: Last error message, empty string when healthy

    ActiveConfig:
      type: object
      required: [profile, encoder, cursor_mode, size, fps, bitrate_kbps, debug_fps]
      properties:
        profile:
          type: string
          enum: [lowlatency, balanced, ultra]
        encoder:
          type: string
          enum: [auto, nvenc, openh264]
        cursor_mode:
          type: string
          enum: [hidden, overlay, capture]
        size:
          type: string
          example: "1920x1080"
          description: WxH string
        fps:
          type: integer
          example: 60
        bitrate_kbps:
          type: integer
          example: 25000
        debug_fps:
          type: integer
          example: 0

    ConfigPatch:
      type: object
      description: Partial configuration update; all fields optional
      properties:
        profile:
          type: string
          enum: [lowlatency, balanced, ultra]
        encoder:
          type: string
          enum: [auto, nvenc, openh264]
        cursor_mode:
          type: string
        size:
          type: string
          example: "1920x1080"
        fps:
          type: integer
        bitrate_kbps:
          type: integer
        debug_fps:
          type: integer

    ClientMetricsRequest:
      type: object
      required:
        - recv_fps
        - decode_fps
        - present_fps
        - recv_bps
        - decode_time_ms_p50
        - decode_time_ms_p95
        - render_time_ms_p95
        - e2e_latency_ms_p50
        - e2e_latency_ms_p95
        - transport_queue_depth
        - decode_queue_depth
        - render_queue_depth
        - jitter_buffer_frames
        - dropped_frames
        - too_late_frames
        - timestamp_ms
      properties:
        recv_fps:
          type: number
          format: double
        decode_fps:
          type: number
          format: double
        present_fps:
          type: number
          format: double
        recv_bps:
          type: integer
          format: int64
          description: Bytes per second received
        decode_time_ms_p50:
          type: number
          format: double
        decode_time_ms_p95:
          type: number
          format: double
        render_time_ms_p95:
          type: number
          format: double
        e2e_latency_ms_p50:
          type: number
          format: double
        e2e_latency_ms_p95:
          type: number
          format: double
        transport_queue_depth:
          type: integer
        decode_queue_depth:
          type: integer
          description: Bounded at DECODE_QUEUE_MAX_FRAMES (2)
        render_queue_depth:
          type: integer
          description: 0 or 1; latest-frame-wins
        jitter_buffer_frames:
          type: integer
        dropped_frames:
          type: integer
          format: int64
        too_late_frames:
          type: integer
          format: int64
        timestamp_ms:
          type: integer
          format: int64
          description: Client epoch-ms timestamp of this sample
        trace_id:
          type: integer
          format: int64
          nullable: true
          description: >
            P2.2 – monotonic trace ID emitted by Android for log correlation.
            High 32 bits = TCP connect counter (resets on stop/play),
            low 32 bits = per-connection sample counter.
            Absent when not set by the client.

    KpiSnapshot:
      type: object
      properties:
        target_fps:
          type: integer
        recv_fps:
          type: number
          format: double
        decode_fps:
          type: number
          format: double
        present_fps:
          type: number
          format: double
        frametime_ms_p95:
          type: number
          format: double
        e2e_latency_ms_p50:
          type: number
          format: double
        e2e_latency_ms_p95:
          type: number
          format: double
        decode_time_ms_p95:
          type: number
          format: double
        render_time_ms_p95:
          type: number
          format: double

    FrameBudgetMs:
      type: object
      description: 16.67 ms frame budget breakdown at 60 fps
      properties:
        capture: {type: number, format: double}
        encode:  {type: number, format: double}
        transport: {type: number, format: double}
        decode:  {type: number, format: double}
        render:  {type: number, format: double}
        margin:  {type: number, format: double}
        total:   {type: number, format: double}

    QueueLimits:
      type: object
      properties:
        usb_jitter_frames_max:  {type: integer}
        wifi_jitter_frames_max: {type: integer}
        decode_queue_max:       {type: integer}
        render_queue_max:       {type: integer}
        transport_queue_max:    {type: integer}
        policy:                 {type: string}

    MetricsSnapshot:
      type: object
      properties:
        start_count:               {type: integer, format: int64}
        stop_count:                {type: integer, format: int64}
        restart_count:             {type: integer, format: int64}
        reconnects:                {type: integer, format: int64}
        frame_in:                  {type: integer, format: int64}
        frame_out:                 {type: integer, format: int64}
        drops:                     {type: integer, format: int64}
        bitrate_actual_bps:        {type: integer, format: int64}
        encode_latency_ms:         {type: number, format: double}
        stream_uptime_sec:         {type: integer, format: int64}
        frame_budget_ms:
          $ref: "#/components/schemas/FrameBudgetMs"
        queue_limits:
          $ref: "#/components/schemas/QueueLimits"
        kpi:
          $ref: "#/components/schemas/KpiSnapshot"
        latest_client_metrics:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/ClientMetricsRequest"
        adaptive_level:            {type: integer, description: "L0–L3"}
        adaptive_events:           {type: integer, format: int64}
        adaptive_action:           {type: string}
        adaptive_reason:           {type: string}
        backpressure_high_events:  {type: integer, format: int64}
        backpressure_recover_events: {type: integer, format: int64}

    ValidValues:
      type: object
      properties:
        encoder:     {type: array, items: {type: string}}
        cursor_mode: {type: array, items: {type: string}}

    # ── Response envelope types ───────────────────────────────────────────────
    StatusResponse:
      allOf:
        - $ref: "#/components/schemas/BaseResponse"
        - type: object
          required: [ok]
          properties:
            ok: {type: boolean}

    HealthResponse:
      allOf:
        - $ref: "#/components/schemas/BaseResponse"
        - type: object
          required: [ok, service, stream_process_alive]
          properties:
            ok:                   {type: boolean}
            service:              {type: string, example: wbeamd-rust}
            stream_process_alive: {type: boolean}

    PresetsResponse:
      allOf:
        - $ref: "#/components/schemas/BaseResponse"
        - type: object
          required: [ok, presets, valid]
          properties:
            ok:
              type: boolean
            presets:
              type: object
              additionalProperties:
                $ref: "#/components/schemas/ActiveConfig"
              description: Named preset map (lowlatency, balanced, ultra)
            valid:
              $ref: "#/components/schemas/ValidValues"

    MetricsResponse:
      allOf:
        - $ref: "#/components/schemas/BaseResponse"
        - type: object
          required: [ok, metrics]
          properties:
            ok:      {type: boolean}
            metrics:
              $ref: "#/components/schemas/MetricsSnapshot"

    ClientMetricsResponse:
      allOf:
        - $ref: "#/components/schemas/BaseResponse"
        - type: object
          required: [ok, action]
          properties:
            ok:     {type: boolean}
            action: {type: string, description: "Adaptation action taken (none|lower_bitrate|raise_bitrate|lower_fps|raise_fps)"}

    ErrorResponse:
      allOf:
        - $ref: "#/components/schemas/BaseResponse"
        - type: object
          required: [ok, error]
          properties:
            ok:    {type: boolean, example: false}
            error: {type: string}
