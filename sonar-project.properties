sonar.projectKey=wbeam
sonar.projectName=WBeam
sonar.sourceEncoding=UTF-8
sonar.scm.provider=git

# Make analyzers stricter where the repo already has enough context.
sonar.java.binaries=.
sonar.python.version=3.12

# Scan the actively maintained code, skip noisy legacy archives and generated outputs.
sonar.sources=android/app/src/main,host/rust,host/scripts,host/daemon,scripts,desktop/apps
sonar.exclusions=**/.git/**,**/.build/**,**/.gradle-user/**,**/logs/**,**/dist/**,**/target/**,**/node_modules/**,**/__pycache__/**,archive/**,**/*.png,**/*.svg,**/*.jar,**/*.so

# Point Sonar at existing TypeScript project configs and common report locations.
sonar.typescript.tsconfigPaths=desktop/apps/desktop-tauri/tsconfig.json,desktop/apps/trainer-tauri/tsconfig.json
sonar.junit.reportPaths=target/surefire-reports
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml,target/site/jacoco-it/jacoco.xml,build/reports/jacoco/test/jacocoTestReport.xml

# Suppress framework-specific false positives and essential complexity
# typescript:S6551 - String() conversions are necessary in Solid.js framework
# typescript:S3358 - Nested ternaries for readable conditional rendering
# typescript:S4624 - Incomplete object properties are framework patterns
# typescript:S7764 - Symbol not found warnings are false positives
# rust:S3776 - Cognitive complexity in essential domain logic (quality adaptation, stream loops)
sonar.issue.ignore.multicriteria=ts-framework,rust-complexity
sonar.issue.ignore.multicriteria.ts-framework.ruleKey=typescript:S6551,typescript:S3358,typescript:S4624,typescript:S7764
sonar.issue.ignore.multicriteria.ts-framework.resourceKey=desktop/apps/**/*.tsx,desktop/apps/**/*.ts
sonar.issue.ignore.multicriteria.rust-complexity.ruleKey=rust:S3776
sonar.issue.ignore.multicriteria.rust-complexity.resourceKey=host/rust/**/*.rs
