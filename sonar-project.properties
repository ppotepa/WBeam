sonar.projectKey=wbeam
sonar.projectName=WBeam
sonar.sourceEncoding=UTF-8
sonar.scm.provider=git

# Make analyzers stricter where the repo already has enough context.
sonar.java.binaries=.
sonar.python.version=3.12

# Scan the actively maintained code, skip noisy legacy archives and generated outputs.
sonar.sources=android/app/src/main,host/rust,host/scripts,host/daemon,scripts,desktop/apps
sonar.exclusions=**/.git/**,**/.build/**,**/.gradle-user/**,**/logs/**,**/dist/**,**/target/**,**/node_modules/**,**/__pycache__/**,archive/**,**/*.png,**/*.svg,**/*.jar,**/*.so

# Point Sonar at existing TypeScript project configs and common report locations.
sonar.typescript.tsconfigPaths=desktop/apps/desktop-tauri/tsconfig.json
sonar.junit.reportPaths=target/surefire-reports
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml,target/site/jacoco-it/jacoco.xml,build/reports/jacoco/test/jacocoTestReport.xml
