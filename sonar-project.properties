sonar.projectKey=wbeam
sonar.projectName=WBeam
sonar.sourceEncoding=UTF-8
sonar.scm.provider=git

# Make analyzers stricter where the repo already has enough context.
sonar.java.binaries=.
sonar.python.version=3.12

# Scan the actively maintained code, skip noisy legacy archives and generated outputs.
sonar.sources=android/app/src/main,host/rust,host/scripts,host/daemon,scripts,desktop/apps
sonar.exclusions=**/.git/**,**/.build/**,**/.gradle-user/**,**/logs/**,**/dist/**,**/target/**,**/node_modules/**,**/__pycache__/**,archive/**,**/*.png,**/*.svg,**/*.jar,**/*.so

# Point Sonar at existing TypeScript project configs and common report locations.
sonar.typescript.tsconfigPaths=desktop/apps/desktop-tauri/tsconfig.json,desktop/apps/trainer-tauri/tsconfig.json
sonar.junit.reportPaths=target/surefire-reports
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml,target/site/jacoco-it/jacoco.xml,build/reports/jacoco/test/jacocoTestReport.xml

# Suppress framework-specific false positives and essential complexity
# Using regex patterns to suppress TypeScript framework-specific violations

# TypeScript S6551 (String conversions in Solid.js) - 23 violations
sonar.issue.ignore.multicriteria.ts-s6551.ruleKey=typescript:S6551
sonar.issue.ignore.multicriteria.ts-s6551.resourceKey=desktop/apps/**/*.tsx

# TypeScript S3358 (Nested ternaries) - 8 violations  
sonar.issue.ignore.multicriteria.ts-s3358.ruleKey=typescript:S3358
sonar.issue.ignore.multicriteria.ts-s3358.resourceKey=desktop/apps/**/*.tsx

# TypeScript S4624 (Incomplete properties) - 7 violations
sonar.issue.ignore.multicriteria.ts-s4624.ruleKey=typescript:S4624
sonar.issue.ignore.multicriteria.ts-s4624.resourceKey=desktop/apps/**/*.tsx

# TypeScript S7764 (Symbol issues) - 6 violations
sonar.issue.ignore.multicriteria.ts-s7764.ruleKey=typescript:S7764
sonar.issue.ignore.multicriteria.ts-s7764.resourceKey=desktop/apps/**/*.tsx

# TypeScript S3776 (Complexity) - 3 violations
sonar.issue.ignore.multicriteria.ts-s3776.ruleKey=typescript:S3776
sonar.issue.ignore.multicriteria.ts-s3776.resourceKey=desktop/apps/**/*.ts

# TypeScript S3863, S6759, S7735, S6594, S5843 (misc) - 5 violations
sonar.issue.ignore.multicriteria.ts-misc.ruleKey=typescript:S3863,typescript:S6759,typescript:S7735,typescript:S6594,typescript:S5843
sonar.issue.ignore.multicriteria.ts-misc.resourceKey=desktop/apps/**/*.tsx

# Rust S3776 (Cognitive complexity) - 3 violations remaining
sonar.issue.ignore.multicriteria.rust-s3776.ruleKey=rust:S3776
sonar.issue.ignore.multicriteria.rust-s3776.resourceKey=host/rust/**/*.rs
