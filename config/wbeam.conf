# WBeam runtime defaults (sectioned format).
# Override order:
#  1) ENV
#  2) ~/.config/wbeam/wbeam.conf
#
# On startup, missing ~/.config/wbeam/wbeam.conf is bootstrapped from this file.

[service]
WBEAM_CONTROL_PORT=5001
WBEAM_STREAM_PORT=5000
WBEAM_DAEMON_SERVICE_NAME=wbeam-daemon
WBEAM_DAEMON_IMPL=auto
WBEAM_USE_RUST_STREAMER=1
WBEAM_START_TIMEOUT_SEC=45
WBEAM_DAEMON_PRESTART_REVERSE=0

[android]
WBEAM_ANDROID_PACKAGE=com.wbeam
WBEAM_ANDROID_ACTIVITY=.MainActivity
WBEAM_ANDROID_PIPELINE=auto

[version]
WBEAM_VERSION_BASE=0.1.0

[x11]
# Desktop UI gate for monitor-object experimental fallback.
WBEAM_X11_ALLOW_MONITOR_OBJECT=0

# Future unification target (currently consumed from x11-virtual-policy.conf):
# ENABLE_SETMONITOR_FALLBACK=0
# DISABLE_REAL_OUTPUT_BACKEND=0
