# WBeam proto unified config (front + back).
# This file is sourced by run.sh.
# Runtime env overrides are intentionally disabled.

# Launcher mode
# RUN_BACKEND: rust | cs
# RUN_DEVICE: adb | qemu
# NOTE:
# - RUN_DEVICE=adb (real device): use Android USB tethering (routing differs per OS).
# - RUN_DEVICE=qemu (emulator): no tethering.
RUN_BACKEND=rust
RUN_DEVICE=adb

# Optional launcher paths
GRADLEW=
ANDROID_LOG_FILE=/tmp/proto-android.log

# Preset: fast | balanced | quality
# Lenovo S6000-H (API 17): balanced daje stabilniejszy decode niż fast.
PROTO_PRESET=balanced

# Transport mode
PROTO_H264=1
PROTO_H264_SOURCE_FRAMED=1
PROTO_H264_REORDER=0

# Cursor in portal stream: hidden | embedded | metadata
PROTO_CURSOR_MODE=embedded
WBEAM_VIDEORATE_DROP_ONLY=1
WBEAM_FRAMED_DUPLICATE_STALE=0
WBEAM_FRAMED_SEND_TIMEOUT_S=0

# Capture / stream tuning (empty means preset defaults)
PROTO_CAPTURE_SIZE=
PROTO_CAPTURE_FPS=
PROTO_CAPTURE_BITRATE_KBPS=
PROTO_MJPEG_FPS=
PROTO_ADB_PUSH_FPS=
PROTO_MAX_FRAME_BYTES=
PROTO_MAX_CHUNK_BYTES=14336
PROTO_JPEG_TARGET_KB=

# Portal
PROTO_PORTAL=1
PROTO_PORTAL_JPEG_SOURCE=debug
PROTO_PORTAL_ONLY=0
PROTO_FORCE_PORTAL=1
PROTO_SESSION_TYPE=wayland

# Android app launch/build
PROTO_ANDROID_BUILD_TYPE=debug
PROTO_FORCE_JAVA_FALLBACK=0
PROTO_REQUIRE_TURBO=1
PROTO_ANDROID_LOGCAT=0
PROTO_ANDROID_LOG_POLLER=0

# Startup behavior
PROTO_WAIT_FOR_FIRST_FRAME_SECS=1
PROTO_WAIT_FOR_FIRST_FRAME_REQUIRED=1

# Optional fixed device/host networking (leave empty for autodetect)
# For RUN_DEVICE=adb this may depend on OS-specific tethering network.
SERIAL=
HOST_IP=
PROTO_ADB_PUSH_ADDR=127.0.0.1:5006

# QEMU (used only when RUN_DEVICE=qemu)
# Emulator path does not require tethering.
QEMU_AVD=WBeam_Tablet_API17
ANDROID_EMULATOR_BIN=
QEMU_LOG=/tmp/proto-emulator.log
QEMU_ARGS=

# C# backend stability knobs
PROTO_ADB_WRITE_TIMEOUT_MS=0
PROTO_H264_SOURCE_READ_TIMEOUT_MS=5000
