# WBeam proto unified config (front + back).
# This file is sourced by run.sh.
# Runtime env overrides are intentionally disabled.

# Launcher mode
# RUN_BACKEND: rust
# RUN_DEVICE: adb
# NOTE:
# - RUN_DEVICE=adb: use Android USB tethering (routing differs per OS).
RUN_BACKEND=rust
RUN_DEVICE=adb

# Optional launcher paths
GRADLEW=
ANDROID_LOG_FILE=/tmp/proto-android.log

# Transport mode
PROTO_H264=1
PROTO_H264_SOURCE_FRAMED=1
PROTO_H264_SOURCE_PORT=5500
PROTO_H264_REORDER=0

# Cursor in portal stream: hidden | embedded | metadata
PROTO_CURSOR_MODE=embedded
# Autotune-derived stable 60 FPS profile (timeout-friendly).
WBEAM_VIDEORATE_DROP_ONLY=0
WBEAM_FRAMED_DUPLICATE_STALE=1
WBEAM_FRAMED_STALE_START_MS=900
WBEAM_FRAMED_STALE_DUP_FPS=2
WBEAM_FRAMED_SEND_TIMEOUT_S=0
WBEAM_PIPEWIRE_KEEPALIVE_MS=16
WBEAM_PIPEWIRE_ALWAYS_COPY=1
WBEAM_FRAMED_PULL_TIMEOUT_MS=20
WBEAM_QUEUE_MAX_BUFFERS=1
WBEAM_QUEUE_MAX_TIME_MS=8
WBEAM_APPSINK_MAX_BUFFERS=1

# Capture / stream tuning (empty means backend defaults)
PROTO_CAPTURE_SIZE=1024x640
PROTO_CAPTURE_FPS=60
PROTO_CAPTURE_BITRATE_KBPS=11000
PROTO_MJPEG_FPS=
PROTO_ADB_PUSH_FPS=
PROTO_MAX_FRAME_BYTES=
PROTO_MAX_CHUNK_BYTES=14336
PROTO_JPEG_TARGET_KB=

# Portal
PROTO_PORTAL=1
PROTO_PORTAL_JPEG_SOURCE=debug
PROTO_PORTAL_DEBUG_FPS=0
PROTO_PORTAL_PERSIST_MODE=0
PROTO_PORTAL_RESTORE_TOKEN_FILE=/tmp/proto-portal-restore-token
PROTO_PORTAL_ONLY=0
PROTO_FORCE_PORTAL=1
PROTO_SESSION_TYPE=wayland

# Android app launch/build
PROTO_ANDROID_BUILD_TYPE=debug
PROTO_FORCE_JAVA_FALLBACK=0
PROTO_ANDROID_LOG_POLLER=0

# Startup behavior
PROTO_ADB_RESET_ON_START=1
PROTO_ADB_SHELL_TIMEOUT_SECS=8
PROTO_ADB_CMD_TIMEOUT_SECS=12
PROTO_ADB_INSTALL_TIMEOUT_SECS=45
PROTO_ADB_INSTALL_HEARTBEAT_SECS=10

# Optional fixed device/host networking (leave empty for autodetect)
# For RUN_DEVICE=adb this may depend on OS-specific tethering network.
SERIAL=
HOST_IP=
PROTO_ADB_PUSH_ADDR=127.0.0.1:5006

# C# backend stability knobs
PROTO_ADB_WRITE_TIMEOUT_MS=35
PROTO_H264_SOURCE_READ_TIMEOUT_MS=1300
