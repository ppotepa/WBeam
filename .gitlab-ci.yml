stages:
  - build
  - publish

workflow:
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH

default:
  interruptible: true
  before_script:
    - |
      if [ -n "${CI_COMMIT_TAG:-}" ]; then
        export WBEAM_VERSION="${CI_COMMIT_TAG#v}"
        export WBEAM_VERSION="${WBEAM_VERSION#V}"
      else
        export WBEAM_VERSION="0.0.0.${CI_DEFAULT_BRANCH}.${CI_PIPELINE_IID}.${CI_COMMIT_SHORT_SHA}"
      fi
    - chmod +x scripts/ci/*.sh

build_deb:
  stage: build
  image: rust:bookworm
  script:
    - apt-get update
    - >
      DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends
      ca-certificates
      curl
      git
      jq
      pkg-config
      build-essential
      libssl-dev
      libdbus-1-dev
      libgstreamer1.0-dev
      libgstreamer-plugins-base1.0-dev
      libx11-dev
      libxrandr-dev
      libxfixes-dev
      libxext-dev
      libxrender-dev
      dpkg-dev
    - ./scripts/ci/build_deb.sh
  artifacts:
    paths:
      - dist/*.deb
      - dist/VERSION.txt
    expire_in: 14 days
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

build_rpm:
  stage: build
  image: fedora:41
  script:
    - dnf -y install ca-certificates curl git jq rust cargo gcc gcc-c++ make pkgconf-pkg-config
    - dnf -y install openssl-devel dbus-devel gstreamer1-devel gstreamer1-plugins-base-devel
    - dnf -y install libX11-devel libXrandr-devel libXfixes-devel libXext-devel libXrender-devel
    - dnf -y install rpm-build tar gzip findutils
    - ./scripts/ci/build_rpm.sh
  artifacts:
    paths:
      - dist/*.rpm
      - dist/VERSION.txt
    expire_in: 14 days
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

build_aarch64_tar:
  stage: build
  image: rust:bookworm
  script:
    - apt-get update
    - >
      DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends
      ca-certificates
      curl
      git
      jq
      pkg-config
      build-essential
      gcc-aarch64-linux-gnu
      libssl-dev
      libdbus-1-dev
      libx11-dev
      libxrandr-dev
      libxfixes-dev
      libxext-dev
      libxrender-dev
      file
      tar
      gzip
    - ./scripts/ci/build_aarch64_tar.sh
  artifacts:
    paths:
      - dist/*aarch64*.tar.gz
      - dist/VERSION.txt
    expire_in: 14 days
  allow_failure: true
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

build_apk_release:
  stage: build
  image: eclipse-temurin:17-jdk-jammy
  variables:
    ANDROID_SDK_ROOT: "/opt/android-sdk"
    ANDROID_HOME: "/opt/android-sdk"
    GRADLE_USER_HOME: "${CI_PROJECT_DIR}/.gradle-user"
  script:
    - apt-get update
    - DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends curl unzip ca-certificates
    - mkdir -p "${ANDROID_SDK_ROOT}/cmdline-tools"
    - curl -fsSL https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -o /tmp/cmdline-tools.zip
    - unzip -q /tmp/cmdline-tools.zip -d /tmp
    - rm -rf "${ANDROID_SDK_ROOT}/cmdline-tools/latest"
    - mv /tmp/cmdline-tools "${ANDROID_SDK_ROOT}/cmdline-tools/latest"
    - 'yes | "${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager" --sdk_root="${ANDROID_SDK_ROOT}" --licenses >/dev/null'
    - '"${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager" --sdk_root="${ANDROID_SDK_ROOT}" "platform-tools" "platforms;android-35" "build-tools;35.0.0"'
    - ./scripts/ci/build_apk_release.sh
  artifacts:
    paths:
      - dist/*.apk
      - dist/VERSION.txt
    expire_in: 14 days
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

publish_github_release:
  stage: publish
  image: alpine:3.21
  variables:
    GIT_STRATEGY: fetch
  script:
    - apk add --no-cache bash curl jq
    - ./scripts/ci/publish_github_release.sh
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
