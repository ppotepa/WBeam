services:
  sonardb:
    image: postgres:16
    container_name: wbeam-sonardb
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
      POSTGRES_DB: sonar
    volumes:
      - sonardb_data:/var/lib/postgresql/data
    restart: unless-stopped

  sonarqube:
    image: sonarqube:26.3.0.120487-community
    container_name: wbeam-sonarqube
    depends_on:
      - sonardb
    ports:
      - "9000:9000"
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonardb:5432/sonar
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_extensions:/opt/sonarqube/extensions
    restart: unless-stopped

  sonar-scanner-once:
    image: sonarsource/sonar-scanner-cli:latest
    container_name: wbeam-sonar-scanner-once
    user: "0:0"
    depends_on:
      - sonarqube
    profiles: ["scan"]
    environment:
      SONAR_HOST_URL: http://sonarqube:9000
      SONAR_TOKEN: ${SONAR_TOKEN}
      SONAR_USER_HOME: /workspace/.sonar
      REPO_DIR: /workspace
      PRE_SCAN_CMD: ./scripts/ci/sonar-prepare.sh
      PROJECT_KEY: wbeam
      PROJECT_NAME: WBeam
      SONAR_BRANCH: ${SONAR_BRANCH:-v0.1.1/base}
    volumes:
      - ./:/workspace
    working_dir: /workspace
    command: ["/bin/sh", "/workspace/scripts/ci/sonar-scan-once.sh"]

volumes:
  sonardb_data:
  sonarqube_data:
  sonarqube_logs:
  sonarqube_extensions:
